name: Docker Scout CVE Scan

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Public images (sample: nginx:1.27)"
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_RW_TOKEN }}

      - name: Run Docker Scout CVEs
        id: scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ inputs.image }}
          only-severities: critical,high
          only-fixed: false
          exit-code: true
          sarif-file: scout-results.sarif
      - uses: austenstone/job-summary@v2.0
        if: always()
        id: summary
        with:
          create-html: true

      - name: Send email with report
        if: always()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: GitHub Actions
          to: boris.lavrishchev.qubership@gmail.com
          subject: Workflow Report
          body: ${{ steps.summary.outputs.job-summary-html }}
          html_body: ${{ steps.summary.outputs.job-summary-html }}